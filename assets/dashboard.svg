    <path d="M6 6H24V24H42V42H24V60H6V78H24V96H42V114H24V132H6V150H24V168H42V186H24V204H42" fill="none" stroke="#3FB950" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity=".9">
