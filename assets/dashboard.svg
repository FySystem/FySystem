    <text class="line l2" x="72" y="292" fill="#C9D1D9"><tspan fill="#39C5CF">[完成]</tspan> 游戏工具 / 游戏外挂实验</text>
    <text class="line l3" x="72" y="326" fill="#C9D1D9"><tspan fill="#39C5CF">[完成]</tspan> Windows 驱动开发 / 自动化流水线</text>
