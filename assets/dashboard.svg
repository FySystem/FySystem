      <rect x="0" y="126" width="12" height="12" rx="3"/><rect x="18" y="126" width="12" height="12" rx="3"/><rect x="36" y="126" width="12" height="12" rx="3"/>
      <rect x="0" y="144" width="12" height="12" rx="3"/><rect x="18" y="144" width="12" height="12" rx="3"/><rect x="36" y="144" width="12" height="12" rx="3"/>
      <rect x="0" y="162" width="12" height="12" rx="3"/><rect x="18" y="162" width="12" height="12" rx="3"/><rect x="36" y="162" width="12" height="12" rx="3"/>
      <rect x="0" y="180" width="12" height="12" rx="3"/><rect x="18" y="180" width="12" height="12" rx="3"/><rect x="36" y="180" width="12" height="12" rx="3"/>
