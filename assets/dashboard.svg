<svg width="900" height="760" viewBox="0 0 900 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">FySystem Dashboard</title>
  <desc id="desc">中文赛博仪表盘风格的 GitHub 主页主视觉</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="0.56" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="glowCyan" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(184 84) rotate(34) scale(380 210)">
      <stop stop-color="#39C5CF" stop-opacity=".42"/>
      <stop offset="1" stop-color="#39C5CF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPink" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(742 136) rotate(140) scale(320 210)">
      <stop stop-color="#DB61A2" stop-opacity=".28"/>
      <stop offset="1" stop-color="#DB61A2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineGlow" x1="36" y1="0" x2="864" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#39C5CF" stop-opacity="0"/>
      <stop offset=".5" stop-color="#39C5CF"/>
      <stop offset="1" stop-color="#39C5CF" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <style>
      .sans { font-family: 'Segoe UI', 'Microsoft YaHei', Arial, sans-serif; }
      .mono { font-family: Consolas, Monaco, 'Courier New', monospace; }
      .muted { fill: #8B949E; }
      .panel { fill: #111827; stroke: #30363D; }
      .line { opacity: 0; animation: show 8s infinite; }
      .l1 { animation-delay: .3s; }
      .l2 { animation-delay: 1.4s; }
      .l3 { animation-delay: 2.5s; }
      .cursor { animation: blink 1s steps(2, start) infinite; }
      .scan { animation: scan 4.8s linear infinite; }
      .bar-a { animation: loadA 3.6s ease-in-out infinite; }
      .bar-b { animation: loadB 3.6s ease-in-out infinite; }
      .bar-c { animation: loadC 3.6s ease-in-out infinite; }
      .pulse { animation: pulse 2.4s ease-in-out infinite; }
      .delay { animation-delay: 1.2s; }
      @keyframes show {
        0%, 8% { opacity: 0; transform: translateY(6px); }
        16%, 88% { opacity: 1; transform: translateY(0); }
        100% { opacity: 0; transform: translateY(-4px); }
      }
      @keyframes blink { 50% { opacity: 0; } }
      @keyframes scan {
        from { transform: translateY(-70px); opacity: .06; }
        50% { opacity: .2; }
        to { transform: translateY(560px); opacity: .04; }
      }
      @keyframes loadA { 0%, 100% { width: 138px; } 50% { width: 196px; } }
      @keyframes loadB { 0%, 100% { width: 170px; } 50% { width: 108px; } }
      @keyframes loadC { 0%, 100% { width: 96px; } 50% { width: 158px; } }
      @keyframes pulse { 0%, 100% { opacity: .45; } 50% { opacity: 1; } }
    </style>
  </defs>

  <rect width="900" height="760" rx="24" fill="url(#bg)"/>
  <rect width="900" height="760" rx="24" fill="url(#glowCyan)"/>
  <rect width="900" height="760" rx="24" fill="url(#glowPink)"/>

  <g opacity=".26">
    <path d="M36 86H864" stroke="#30363D"/>
    <path d="M36 166H864" stroke="#30363D"/>
    <path d="M36 246H864" stroke="#30363D"/>
    <path d="M36 326H864" stroke="#30363D"/>
    <path d="M36 406H864" stroke="#30363D"/>
