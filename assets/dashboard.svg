    <circle cx="244" cy="602" r="4"/>
    <circle cx="356" cy="594" r="4"/>
    <circle cx="580" cy="596" r="4"/>
  </g>

  <rect x="760" y="184" width="96" height="466" rx="16" class="panel"/>
