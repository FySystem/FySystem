  <text x="450" y="429" class="mono" font-size="20" font-weight="700" fill="#F8FAFC">Driver Lab</text>
  <text x="430" y="458" class="sans" font-size="15" fill="#C9D1D9">Windows 驱动开发 / 底层调试</text>

  <rect x="44" y="508" width="692" height="142" rx="16" class="panel"/>
