  <rect x="44" y="386" width="328" height="92" rx="16" class="panel"/>
  <circle class="pulse" cx="76" cy="422" r="8" fill="#39C5CF"/>
  <text x="96" y="429" class="mono" font-size="20" font-weight="700" fill="#F8FAFC">Game Tooling</text>
  <text x="76" y="458" class="sans" font-size="15" fill="#C9D1D9">玩法脚本 / 编辑器工具 / 游戏外挂</text>

