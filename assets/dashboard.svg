  <text x="72" y="576" class="mono" font-size="14" fill="#8B949E">commit signal / activity stream</text>
  <polyline points="76,630 132,618 188,626 244,602 300,614 356,594 412,616 468,600 524,624 580,596 688,612" fill="none" stroke="#39C5CF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <g fill="#58A6FF">
