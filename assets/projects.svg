<svg width="900" height="250" viewBox="0 0 900 250" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">项目面板</title>
  <desc id="desc">FySystem 的两个当前项目入口</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="900" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101828"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#39C5CF"/>
      <stop offset="1" stop-color="#58A6FF"/>
    </linearGradient>
    <style>
      .sans { font-family: 'Segoe UI', 'Microsoft YaHei', Arial, sans-serif; }
      .mono { font-family: Consolas, Monaco, 'Courier New', monospace; }
      .pulse { animation: pulse 2.6s ease-in-out infinite; }
      .delay { animation-delay: 1.3s; }
      @keyframes pulse {
        0%, 100% { opacity: .45; }
        50% { opacity: 1; }
      }
    </style>
  </defs>

  <rect width="900" height="250" rx="18" fill="url(#panel)" stroke="#30363D"/>
  <text x="34" y="45" class="sans" font-size="24" font-weight="700" fill="#F0F6FC">当前构建</text>
  <text x="34" y="73" class="mono" font-size="15" fill="#8B949E">本地 SVG 面板，不依赖容易 503 的统计服务</text>

  <a href="https://github.com/FySystem/oasis-skill-plus">
    <rect x="34" y="96" width="400" height="118" rx="12" fill="#161B22" stroke="#30363D"/>
    <circle class="pulse" cx="66" cy="128" r="8" fill="#39C5CF"/>
    <text x="88" y="135" class="mono" font-size="20" font-weight="700" fill="#F0F6FC">oasis-skill-plus</text>
    <text x="66" y="166" class="sans" font-size="16" fill="#C9D1D9">Oasis 相关工具与玩法能力扩展</text>
    <text x="66" y="194" class="mono" font-size="14" fill="#39C5CF">JavaScript / UGC / Tooling</text>
  </a>

  <a href="https://github.com/FySystem/oasis-origins-mcp">
    <rect x="466" y="96" width="400" height="118" rx="12" fill="#161B22" stroke="#30363D"/>
    <circle class="pulse delay" cx="498" cy="128" r="8" fill="#58A6FF"/>
    <text x="520" y="135" class="mono" font-size="20" font-weight="700" fill="#F0F6FC">oasis-origins-mcp</text>
    <text x="498" y="166" class="sans" font-size="16" fill="#C9D1D9">把工程上下文接入 MCP 自动化流程</text>
    <text x="498" y="194" class="mono" font-size="14" fill="#58A6FF">Go / MCP / Automation</text>
  </a>

  <rect x="34" y="230" width="832" height="2" rx="1" fill="url(#accent)"/>
</svg>
